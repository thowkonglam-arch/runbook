<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLT Final Cutover Runbook</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:       #f0f2f5;
  --surface:  #e8eaee;
  --panel:    #ffffff;
  --elevated: #f5f6f8;
  --hover:    #eaecf2;
  --border:   #d0d4de;
  --borderlt: #e2e5ec;
  --txt:      #1a2038;
  --txt2:     #4a5470;
  --txtm:     #8a92b0;
  --accent:   #2563eb;
  --accentg:  rgba(37,99,235,0.10);
  --green:    #16a34a;
  --greeng:   rgba(22,163,74,0.12);
  --red:      #dc2626;
  --redg:     rgba(220,38,38,0.10);
  --amber:    #d97706;
  --amberg:   rgba(217,119,6,0.12);
  --cyan:     #0891b2;
  --cyang:    rgba(8,145,178,0.12);
  --purple:   #7c3aed;
  --purpleg:  rgba(124,58,237,0.10);
  --orange:   #ea580c;
  --orangeg:  rgba(234,88,12,0.10);
  --slate:    #64748b;
  --slateg:   rgba(100,116,139,0.15);
  --today:    #dc2626;
  --fn-mono:  'IBM Plex Mono', monospace;
  --fn-ui:    'Barlow', sans-serif;
  --row-h:    36px;
  --hdr-h:    52px;
  --bar-h:    56px;
  --left-w:   380px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--fn-ui);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--txt2)}

/* ── TOOLBAR ── */
#toolbar{height:var(--bar-h);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 12px;flex-shrink:0;z-index:100;position:relative}
.brand{font-family:var(--fn-mono);font-size:10px;font-weight:600;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;margin-right:8px;white-space:nowrap}
.brand em{color:var(--txt2);font-style:normal}
.sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0}
.tg{display:flex;align-items:center;gap:4px}
.btn{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 9px;background:var(--elevated);border:1px solid var(--border);color:var(--txt2);font-family:var(--fn-ui);font-size:11px;font-weight:500;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn:hover{background:var(--hover);color:var(--txt);border-color:var(--accent)}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.pri:hover{background:#2570d4}
.btn svg{width:13px;height:13px}
.fi{height:28px;padding:0 8px;background:var(--elevated);border:1px solid var(--border);color:var(--txt);font-family:var(--fn-ui);font-size:11px;border-radius:4px;outline:none;transition:border-color .12s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--txtm)}
select.fi option{background:var(--panel)}
#si{width:155px}
.fs{min-width:110px;cursor:pointer}
input[type=date].fi{width:120px;color-scheme:dark}
#zl{font-family:var(--fn-mono);font-size:9px;color:var(--txt2);min-width:38px;text-align:center}
.bz{width:26px;height:26px;padding:0;justify-content:center;font-size:15px;font-weight:700}


/* ── LEGEND ── */
#legend{height:28px;background:var(--surface);border-bottom:1px solid var(--borderlt);display:flex;align-items:center;gap:14px;padding:0 14px;flex-shrink:0}
.ll{font-size:9px;font-weight:700;color:var(--txtm);text-transform:uppercase;letter-spacing:.1em}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt2)}
.ld{width:9px;height:9px;border-radius:2px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#main{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#lp{width:var(--left-w);flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--border);background:var(--surface);overflow:hidden;position:relative;z-index:10}
#lh{height:var(--hdr-h);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
.ch{font-family:var(--fn-mono);font-size:9px;font-weight:600;color:var(--txtm);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-id{width:70px;flex-shrink:0}
.c-name{flex:1;min-width:0}
.c-owner{width:90px;flex-shrink:0}
.c-phase{width:82px;flex-shrink:0}
#lb{overflow-y:auto;overflow-x:hidden;flex:1}

/* ── RIGHT PANEL ── */
#rp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#thw{height:var(--hdr-h);overflow:hidden;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border)}
#th{height:100%;position:relative;white-space:nowrap}
#tbw{flex:1;overflow:auto}
#tb{position:relative}

/* ── ROWS ── */
.tr{height:var(--row-h);display:flex;align-items:center;border-bottom:1px solid var(--borderlt);cursor:pointer;transition:background .1s;position:relative}
.tr:hover{background:var(--hover)}
.tr.sel{background:var(--accentg)}
.tr .c-id{padding:0 8px;font-family:var(--fn-mono);font-size:9px;color:var(--txtm)}
.tr.sel .c-id{color:var(--accent)}
.tr .c-name{flex:1;min-width:0;padding:0 8px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr .c-owner{width:90px;flex-shrink:0;padding:0 5px;font-size:10px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr .c-phase{width:82px;flex-shrink:0;padding:0 5px}
.pill{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 4px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:74px}
.timr{height:var(--row-h);border-bottom:1px solid var(--borderlt);position:relative}
.timr:hover{background:rgba(255,255,255,.01)}
.timr.sel{background:rgba(61,142,245,.04)}

/* ── GANTT BAR ── */
.gb{position:absolute;height:20px;top:50%;transform:translateY(-50%);border-radius:3px;cursor:grab;display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .12s,box-shadow .12s;user-select:none;min-width:3px}
.gb:hover{filter:brightness(1.25);box-shadow:0 2px 10px rgba(0,0,0,.5)}
.gb:active{cursor:grabbing}
.rh{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:ew-resize;border-radius:0 3px 3px 0}
.rh:hover{background:rgba(255,255,255,.25)}
.s-ns{background:#94a3b8;color:#fff}
.s-ip{background:var(--accent);color:#fff}
.s-cp{background:var(--green);color:#fff}
.s-bl{background:var(--red);color:#fff}
.s-ar{background:var(--amber);color:#fff}

/* ── TIMELINE HEADER ── */
.tl-mo{position:absolute;top:0;height:20px;font-family:var(--fn-mono);font-size:8px;font-weight:700;color:var(--txtm);text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;padding:0 5px;border-bottom:1px solid var(--borderlt)}
.tl-dy{position:absolute;top:20px;height:32px;font-family:var(--fn-mono);font-size:8px;color:var(--txtm);display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--borderlt)}
.tl-dy.wknd{opacity:.45}
.tl-dy.tdy{color:var(--today);font-weight:700}
.tl-dy .dn{font-size:9px;font-weight:600}
.tl-dy .dm{font-size:7px;opacity:.7}
.gl{position:absolute;top:0;bottom:0;width:1px;background:var(--borderlt);pointer-events:none}
.gl.ms{background:var(--border)}
#todayln{position:absolute;top:0;bottom:0;width:2px;background:var(--today);pointer-events:none;z-index:20;box-shadow:0 0 8px rgba(255,61,107,.45)}
#todayln::before{content:'NOW';position:absolute;top:2px;left:3px;font-family:var(--fn-mono);font-size:7px;font-weight:700;color:var(--today);letter-spacing:.08em}

/* ── TOOLTIP ── */
#tip{position:fixed;z-index:9999;pointer-events:none;background:var(--elevated);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-size:10px;color:var(--txt);box-shadow:0 4px 24px rgba(0,0,0,.6);opacity:0;transition:opacity .1s;max-width:260px}
#tip.on{opacity:1}
#tip .tt{font-weight:700;margin-bottom:5px;font-size:11px}
#tip .tr2{color:var(--txt2);margin-top:2px}
#tip .tr2 b{color:var(--txt)}

/* ── DETAIL PANEL ── */
#ep{position:fixed;right:-380px;top:calc(var(--bar-h) + 28px);bottom:0;width:360px;background:var(--panel);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.6)}
#ep.open{right:0}
#eph{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#eph h3{font-size:12px;font-weight:700;color:var(--txt)}
.tid-b{font-family:var(--fn-mono);font-size:9px;color:var(--accent);background:var(--accentg);padding:2px 6px;border-radius:3px}
#epb{flex:1;overflow-y:auto;padding:14px}
.fg{margin-bottom:14px}
.fl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txtm);margin-bottom:5px}
.fv{width:100%;min-height:32px;padding:6px 10px;background:var(--surface);border:1px solid var(--borderlt);color:var(--txt);font-family:var(--fn-ui);font-size:11px;line-height:1.5;border-radius:4px;word-break:break-word}
.fv.mono{font-family:var(--fn-mono);font-size:10px;color:var(--accent);font-weight:600}
.fv.muted{color:var(--txt2)}
.fv.notes{min-height:64px;color:var(--txt2);font-style:italic}
.iob{width:28px;padding:0;justify-content:center}

/* ── STATS ── */
#stats{height:26px;background:var(--surface);border-top:1px solid var(--borderlt);display:flex;align-items:center;gap:14px;padding:0 14px;flex-shrink:0}
.si{font-family:var(--fn-mono);font-size:9px;color:var(--txtm)}
.si b{color:var(--txt2)}

/* ── PHASE COLOURS ── */
.ph-pre{background:rgba(8,145,178,.13);color:#0369a1}
.ph-e1{background:rgba(37,99,235,.12);color:#1d4ed8}
.ph-e2{background:rgba(124,58,237,.12);color:#6d28d9}
.ph-ce1{background:rgba(217,119,6,.13);color:#b45309}
.ph-ce2{background:rgba(234,88,12,.12);color:#c2410c}
.ph-ce3{background:rgba(220,38,38,.12);color:#b91c1c}
.ph-pg{background:rgba(22,163,74,.12);color:#15803d}
.ph-oth{background:rgba(100,116,139,.12);color:#475569}

@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.tr,.timr{animation:fi .18s ease backwards}

/* ── HOUR HEADER VIEW ── */
.tl-hr{position:absolute;top:20px;height:32px;font-family:var(--fn-mono);font-size:8px;color:var(--txtm);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--borderlt);letter-spacing:.02em}
.tl-hr.mhour{color:var(--txt2)}
</style>
</head>
<body>
<div id="app">
<div id="toolbar">
  <div class="brand">NLT FINAL CUTOVER <em>// RUNBOOK</em></div>
  <div class="sep"></div>
  <div class="tg">
    <input type="text" id="si" class="fi" placeholder="🔍 Search…" oninput="applyFilters()">
    <select id="fp" class="fi fs" onchange="applyFilters()"><option value="">All Phases</option></select>
  </div>
  <div class="sep"></div>
  <div class="tg">
    <button class="btn bz" onclick="zoom(-1)">−</button>
    <div id="zl">100%</div>
    <button class="btn bz" onclick="zoom(1)">+</button>
  </div>
  <div class="sep"></div>
  <div class="tg">
    <select id="vmode" class="fi" onchange="setViewMode()" style="min-width:80px">
      <option value="day">Day View</option>
      <option value="hour" selected>Hour View</option>
    </select>
  </div>
  <div class="sep"></div>
  <div class="tg">
    <button class="btn" onclick="jumpToNow()">Now</button>
    <button class="btn" onclick="jumpToStart()">Start</button>
  </div>
  <div style="flex:1"></div>
  <div id="now-clock" style="font-family:var(--fn-mono);font-size:10px;color:var(--red);letter-spacing:.06em;padding-right:8px;font-weight:600"></div>
</div>

<div id="legend">
  <span class="ll">Phase:</span>
  <span class="li"><span class="ld" style="background:#0891b2"></span>Pre-Req</span>
  <span class="li"><span class="ld" style="background:#2563eb"></span>E1 Base</span>
  <span class="li"><span class="ld" style="background:#7c3aed"></span>E2 Delta</span>
  <span class="li"><span class="ld" style="background:#d97706"></span>CE1</span>
  <span class="li"><span class="ld" style="background:#ea580c"></span>CE2</span>
  <span class="li"><span class="ld" style="background:#dc2626"></span>CE3</span>
  <span class="li"><span class="ld" style="background:#16a34a"></span>Post GL</span>
</div>

<div id="main">
  <div id="lp">
    <div id="lh">
      <div class="ch c-id">ID</div>
      <div class="ch c-name">Activity</div>
      <div class="ch c-owner">Team / PIC</div>
      <div class="ch c-phase">Phase</div>
    </div>
    <div id="lb"></div>
  </div>
  <div id="rp">
    <div id="thw"><div id="th"></div></div>
    <div id="tbw" onscroll="syncScroll(event)">
      <div id="tb"><div id="todayln" style="display:none"></div></div>
    </div>
  </div>
</div>

<div id="stats">
  <span class="si">Tasks: <b id="st-tot">0</b></span>
  <span class="si">Showing: <b id="st-vis">0</b></span>
  <span class="si">Range: <b id="st-rng">–</b></span>
</div>
</div>

<div id="ep">
  <div id="eph">
    <h3>Task Detail</h3>
    <div style="display:flex;align-items:center;gap:7px">
      <span id="ep-id" class="tid-b"></span>
      <button class="btn iob" onclick="closePanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="epb">
    <div class="fg"><div class="fl">Activity</div><div id="ep-name" class="fv"></div></div>
    <div class="fg"><div class="fl">Phase</div><div id="ep-phase" class="fv muted"></div></div>
    <div class="fg" style="display:flex;gap:10px">
      <div style="flex:1"><div class="fl">Planned Start (SGT)</div><div id="ep-start" class="fv mono"></div></div>
      <div style="flex:1"><div class="fl">Planned End (SGT)</div><div id="ep-end" class="fv mono"></div></div>
    </div>
    <div class="fg"><div class="fl">Duration</div><div id="ep-dur" class="fv muted"></div></div>
    <div class="fg"><div class="fl">Team</div><div id="ep-team" class="fv muted"></div></div>
    <div class="fg"><div class="fl">Main PIC</div><div id="ep-owner" class="fv muted"></div></div>
    <div class="fg" id="ep-support-row"><div class="fl">Support PIC</div><div id="ep-support" class="fv muted"></div></div>
    <div class="fg" id="ep-notes-row"><div class="fl">Remarks</div><div id="ep-notes" class="fv notes"></div></div>
  </div>
</div>

<div id="tip"></div>

// ── STATE ──
let tasks = JSON.parse(JSON.stringify(RUNBOOK_TASKS));
let filtered = [];
let selId = null;
let dayW = 18; // px per hour (default hour view)
let viewMode = 'hour'; // 'hour' | 'day'
let chartStart = null;
let chartEnd = null;
const HOUR_MS = 3600000;
const DAY_MS = 86400000;

// ── INIT ──
computeRange();
populateDropdowns();
applyFilters();
setTimeout(() => jumpToNow(), 200);

function computeRange() {
  const dates = tasks.flatMap(t => [new Date(t.start), new Date(t.end)]);
  if (!dates.length) return;
  chartStart = new Date(Math.min(...dates));
  chartEnd   = new Date(Math.max(...dates));
  // pad
  chartStart = new Date(chartStart.getTime() - 4*HOUR_MS);
  chartEnd   = new Date(chartEnd.getTime() + 6*HOUR_MS);
}

function populateDropdowns() {
  const phases = [...new Set(tasks.map(t=>t.phase).filter(Boolean))].sort();
  const fp = document.getElementById('fp');
  const fpv = fp.value;
  fp.innerHTML = '<option value="">All Phases</option>' + phases.map(p=>`<option>${esc(p)}</option>`).join('');
  fp.value = fpv;
}

function applyFilters() {
  const q  = document.getElementById('si').value.toLowerCase();
  const ph = document.getElementById('fp').value;
  filtered = tasks.filter(t => {
    if (q && !t.name.toLowerCase().includes(q) && !t.id.toLowerCase().includes(q) &&
        !t.owner.toLowerCase().includes(q) && !t.team.toLowerCase().includes(q)) return false;
    if (ph && t.phase !== ph) return false;
    return true;
  });
  renderRows();
  updateStats();
}

function clearFilters() {
  document.getElementById('si').value = '';
  document.getElementById('fp').value = '';
  applyFilters();
}

// ── RENDER ──
function renderRows() {
  if (!tasks.length || !chartStart) return;

  const totalH = Math.ceil((chartEnd - chartStart) / HOUR_MS) + 1;
  const hpx = dayW; // px per hour
  const dpx = dayW * 24; // px per day
  const totalW = viewMode === 'hour' ? totalH * hpx : Math.ceil((chartEnd - chartStart) / DAY_MS + 1) * dpx;

  // LEFT
  let lhtml = '';
  filtered.forEach((t, i) => {
    const pc = phaseClass(t.phase);
    lhtml += `<div class="tr${t.id===selId?' sel':''}" onclick="openPanel('${esc2(t.id)}')" style="animation-delay:${Math.min(i*8,300)}ms">
      <div class="c-id">${esc(t.id)}</div>
      <div class="c-name" title="${esc(t.name)}">${esc(t.name)}</div>
      <div class="c-owner" title="${esc(t.team||t.owner)}">${esc(t.team||t.owner)}</div>
      <div class="c-phase"><span class="pill ${pc}">${esc(t.phase)}</span></div>
    </div>`;
  });
  document.getElementById('lb').innerHTML = lhtml;

  // TIMELINE HEADER
  let hhtml = '';
  if (viewMode === 'hour') {
    // Hour view: top row = date labels, bottom = hours
    let dayLabels = {};
    for (let h = 0; h < totalH; h++) {
      const dt = new Date(chartStart.getTime() + h*HOUR_MS);
      const dk = dt.toDateString();
      if (!dayLabels[dk]) dayLabels[dk] = h;
      const hr = dt.getHours();
      const isKey = hr % 6 === 0;
      hhtml += `<div class="tl-hr${isKey?' mhour':''}" style="left:${h*hpx}px;width:${hpx}px">${isKey ? ('0'+hr).slice(-2)+'h' : (hr===0?'':hr%3===0?('0'+hr).slice(-2):'')}</div>`;
    }
    // Day labels
    let dayHtml = '';
    const dayEntries = Object.entries(dayLabels);
    dayEntries.forEach(([dk, startH], idx) => {
      const nextH = idx < dayEntries.length-1 ? dayEntries[idx+1][1] : totalH;
      const w = (nextH - startH) * hpx;
      const dt = new Date(chartStart.getTime() + startH*HOUR_MS);
      const label = dt.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
      dayHtml += `<div class="tl-mo" style="left:${startH*hpx}px;width:${w}px">${label}</div>`;
    });
    hhtml = dayHtml + hhtml;
  } else {
    // Day view
    const totalDays = Math.ceil((chartEnd - chartStart) / DAY_MS) + 1;
    let monthLabels = {};
    for (let d = 0; d < totalDays; d++) {
      const dt = new Date(chartStart.getTime() + d*DAY_MS);
      const mk = dt.toLocaleString('en',{month:'short',year:'numeric'});
      if (!monthLabels[mk]) monthLabels[mk] = d;
      const dow = dt.getDay();
      const isWknd = dow===0||dow===6;
      const isTdy = isSameDay(dt, new Date());
      hhtml += `<div class="tl-dy${isWknd?' wknd':''}${isTdy?' tdy':''}" style="left:${d*dpx}px;width:${dpx}px"><div class="dn">${dt.getDate()}</div><div class="dm">${['Su','Mo','Tu','We','Th','Fr','Sa'][dow]}</div></div>`;
    }
    Object.entries(monthLabels).forEach(([mk, startD], idx) => {
      const entries = Object.entries(monthLabels);
      const nextD = idx < entries.length-1 ? entries[idx+1][1] : totalDays;
      hhtml = `<div class="tl-mo" style="left:${startD*dpx}px;width:${(nextD-startD)*dpx}px">${mk}</div>` + hhtml;
    });
  }
  document.getElementById('th').style.width = totalW + 'px';
  document.getElementById('th').innerHTML = hhtml;

  // TIMELINE BODY - gridlines
  let bhtml = '<div id="todayln" style="display:none"></div>';
  if (viewMode === 'hour') {
    for (let h = 0; h < totalH; h++) {
      const dt = new Date(chartStart.getTime() + h*HOUR_MS);
      const isDay = dt.getHours() === 0;
      const isMid = dt.getHours() === 12;
      if (isDay || isMid) {
        bhtml += `<div class="gl${isDay?' ms':''}" style="left:${h*hpx}px"></div>`;
      }
    }
  } else {
    const totalDays = Math.ceil((chartEnd - chartStart) / DAY_MS) + 1;
    for (let d = 0; d < totalDays; d++) {
      const dt = new Date(chartStart.getTime() + d*DAY_MS);
      const isMS = dt.getDate() === 1;
      bhtml += `<div class="gl${isMS?' ms':''}" style="left:${d*dpx}px"></div>`;
    }
  }

  // Task rows
  filtered.forEach((t, i) => {
    const st = new Date(t.start);
    const en = new Date(t.end);
    let left, width;
    if (viewMode === 'hour') {
      const offH = (st - chartStart) / HOUR_MS;
      const durH = Math.max(0.1, (en - st) / HOUR_MS);
      left = offH * hpx;
      width = Math.max(3, durH * hpx - 1);
    } else {
      const offD = (st - chartStart) / DAY_MS;
      const durD = Math.max(0.1, (en - st) / DAY_MS);
      left = offD * dpx;
      width = Math.max(3, durD * dpx - 1);
    }
    const sc = statusClass(t.status);
    const lbl = width > 40 ? esc(t.name.substring(0,40)) : '';
    const rowH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-h'));
    bhtml += `<div class="timr${t.id===selId?' sel':''}" style="height:${rowH}px;animation-delay:${Math.min(i*8,300)}ms" onclick="openPanel('${esc2(t.id)}')">
      <div class="gb ${sc}" style="left:${left}px;width:${width}px"
        data-tid="${esc2(t.id)}"
        onmouseenter="showTip(event,'${esc2(t.id)}')"
        onmouseleave="hideTip()"
        onclick="openPanel('${esc2(t.id)}');event.stopPropagation()">
        ${lbl}
      </div>
    </div>`;
  });

  document.getElementById('tb').innerHTML = bhtml;
  document.getElementById('tb').style.width = totalW + 'px';
  document.getElementById('tb').style.minHeight = (filtered.length * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-h'))) + 'px';

  // Today line
  const now = new Date();
  let todayLeft;
  if (viewMode === 'hour') {
    todayLeft = (now - chartStart) / HOUR_MS * hpx;
  } else {
    todayLeft = (now - chartStart) / DAY_MS * dpx;
  }
  if (todayLeft >= 0 && todayLeft < totalW) {
    const tl = document.getElementById('todayln');
    tl.style.display = 'block';
    tl.style.left = todayLeft + 'px';
    tl.style.height = (filtered.length * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-h'))) + 'px';
  }
}

// ── SYNC SCROLL ──
function syncScroll(e) {
  document.getElementById('lb').scrollTop = e.target.scrollTop;
  document.getElementById('thw').scrollLeft = e.target.scrollLeft;
}
document.getElementById('lb').addEventListener('scroll', e => {
  document.getElementById('tbw').scrollTop = e.target.scrollTop;
});

// ── ZOOM ──
function zoom(dir) {
  const hourSteps = [2,3,5,8,12,18,24,36,48,64];
  const daySteps  = [20,30,48,72,100,150];
  const steps = viewMode === 'hour' ? hourSteps : daySteps;
  let idx = steps.findIndex(s => s >= dayW);
  if (idx === -1) idx = steps.length - 1;
  idx = Math.max(0, Math.min(steps.length-1, idx+dir));
  dayW = steps[idx];
  const base = viewMode === 'hour' ? 18 : 48;
  document.getElementById('zl').textContent = Math.round(dayW/base*100) + '%';
  renderRows();
}

document.getElementById('tbw').addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); zoom(e.deltaY < 0 ? 1 : -1); }
}, {passive:false});

// ── VIEW MODE ──
function setViewMode() {
  viewMode = document.getElementById('vmode').value;
  dayW = viewMode === 'hour' ? 18 : 48;
  document.getElementById('zl').textContent = '100%';
  renderRows();
  setTimeout(() => jumpToNow(), 50);
}

// ── JUMP ──
function jumpToNow() {
  const now = new Date();
  let off;
  const hpx = dayW; const dpx = dayW*24;
  if (viewMode === 'hour') off = (now - chartStart)/HOUR_MS * hpx;
  else off = (now - chartStart)/DAY_MS * dpx;
  const w = document.getElementById('tbw');
  w.scrollLeft = Math.max(0, off - w.clientWidth/2);
}
function jumpToStart() { document.getElementById('tbw').scrollLeft = 0; }


// ── TOOLTIP ──
function showTip(e, id) {
  const t = tasks.find(t=>t.id===id); if (!t) return;
  const st = new Date(t.start), en = new Date(t.end);
  const durMin = Math.round((en-st)/60000);
  const durStr = durMin >= 60 ? `${Math.floor(durMin/60)}h ${durMin%60}m` : `${durMin}m`;
  const tip = document.getElementById('tip');
  tip.innerHTML = `<div class="tt">${esc(t.name)}</div>
    <div class="tr2">ID: <b>${esc(t.id)}</b></div>
    <div class="tr2">Team: <b>${esc(t.team)}</b></div>
    <div class="tr2">PIC: <b>${esc(t.owner)}</b>${t.support?` / ${esc(t.support)}`:''}</div>
    <div class="tr2">Phase: <b>${esc(t.phase)}</b></div>
    <div class="tr2">Status: <b>${esc(t.status)}</b></div>
    <div class="tr2">Start: <b>${t.start.replace('T',' ')}</b></div>
    <div class="tr2">End: <b>${t.end.replace('T',' ')}</b></div>
    <div class="tr2">Duration: <b>${durStr}</b></div>
    ${t.notes?`<div class="tr2" style="margin-top:5px;font-style:italic;opacity:.75">${esc(t.notes.substring(0,120))}</div>`:''}`;
  tip.classList.add('on');
  posTip(e);
}
function hideTip() { document.getElementById('tip').classList.remove('on'); }
function posTip(e) {
  const tip = document.getElementById('tip');
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 280 > window.innerWidth) x = e.clientX - 284;
  if (y + tip.offsetHeight + 10 > window.innerHeight) y = e.clientY - tip.offsetHeight - 8;
  tip.style.left = x+'px'; tip.style.top = y+'px';
}
document.addEventListener('mousemove', e => {
  if (document.getElementById('tip').classList.contains('on')) posTip(e);
});

// ── DETAIL PANEL ──
function openPanel(id) {
  const t = tasks.find(t => t.id === id); if (!t) return;
  selId = id;
  document.getElementById('ep-id').textContent      = t.id;
  document.getElementById('ep-name').textContent    = t.name;
  document.getElementById('ep-phase').textContent   = t.phase || '—';
  document.getElementById('ep-start').textContent   = t.start.replace('T', '  ');
  document.getElementById('ep-end').textContent     = t.end.replace('T', '  ');
  document.getElementById('ep-dur').textContent     = t.duration || '—';
  document.getElementById('ep-team').textContent    = t.team || '—';
  document.getElementById('ep-owner').textContent   = t.owner || '—';
  const supRow = document.getElementById('ep-support-row');
  if (t.support) {
    document.getElementById('ep-support').textContent = t.support;
    supRow.style.display = '';
  } else {
    supRow.style.display = 'none';
  }
  const notesRow = document.getElementById('ep-notes-row');
  if (t.notes) {
    document.getElementById('ep-notes').textContent = t.notes;
    notesRow.style.display = '';
  } else {
    notesRow.style.display = 'none';
  }
  document.getElementById('ep').classList.add('open');
  // Highlight selected row
  document.querySelectorAll('#lb .tr').forEach((r, i) => {
    if (i < filtered.length) r.classList.toggle('sel', filtered[i].id === id);
  });
  document.querySelectorAll('#tb .timr').forEach((r, i) => {
    if (i < filtered.length) r.classList.toggle('sel', filtered[i].id === id);
  });
}
function closePanel() {
  document.getElementById('ep').classList.remove('open');
  selId = null;
  document.querySelectorAll('.sel').forEach(el => el.classList.remove('sel'));
}

// ── STATS ──
function updateStats() {
  document.getElementById('st-tot').textContent = tasks.length;
  document.getElementById('st-vis').textContent = filtered.length;
  if (filtered.length) {
    const s = filtered.map(t=>t.start).sort()[0];
    const e = filtered.map(t=>t.end).sort().reverse()[0];
    document.getElementById('st-rng').textContent = s.substring(0,10) + ' → ' + e.substring(0,10);
  }
}

// ── LIVE CLOCK (SGT) ──
function updateClock() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-GB', {
    timeZone:'Asia/Singapore',year:'numeric',month:'short',
    day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false
  }).formatToParts(now);
  const get = t => parts.find(p=>p.type===t)?.value||'';
  document.getElementById('now-clock').textContent =
    `SGT  ${get('day')} ${get('month')} ${get('year')}  ${get('hour')}:${get('minute')}:${get('second')}`;
}
updateClock();
setInterval(updateClock, 1000);
setInterval(() => renderRows(), 60000);

// ── HELPERS ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc2(s) { return String(s||'').replace(/'/g,"\'"); }
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function statusClass(s) {
  return {'Not Started':'s-ns','In Progress':'s-ip','Complete':'s-cp','Blocked':'s-bl','At Risk':'s-ar'}[s]||'s-ns';
}
function phaseClass(p) {
  if (!p) return 'ph-oth';
  const m = {'Pre-Requisite':'ph-pre','E1 Base Migration':'ph-e1','E2 Delta Migration':'ph-e2','CE1 Order Catchup':'ph-ce1','CE2 Order Catchup':'ph-ce2','CE3 Order Catchup':'ph-ce3','Post Go-Live':'ph-pg'};
  return m[p]||'ph-oth';
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closePanel();
  if ((e.ctrlKey||e.metaKey)&&e.key==='=') { e.preventDefault(); zoom(1); }
  if ((e.ctrlKey||e.metaKey)&&e.key==='-') { e.preventDefault(); zoom(-1); }
});
</script>
